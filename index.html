<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Рулетка 888 ONLINE</title>

<style>
body {
    background: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('https://tourdnepr.com/images/stories/news_2025/november/03_ruletka_02.jpg');
    background-size: cover;
    background-position: center;
    color: white;
    display: flex;
    font-family: Arial;
}

#left { width: 30%; padding: 10px; }
#right { width: 70%; text-align: center; }

h1 {
    color: gold;
    text-shadow: 0 0 10px gold, 0 0 20px orange;
}

.board {
    display: grid;
    grid-template-columns: repeat(12, 60px);
    gap: 2px;
    justify-content: center;
}

.cell {
    width: 60px;
    height: 60px;
    border: 1px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.red { background: red; }
.black { background: black; }
.green { background: green; }

.bet { outline: 3px solid yellow; }

.special {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 5px;
}

.special .cell {
    width: 90px;
    height: 40px;
}
</style>

</head>
<body>

<div id="left">
<h2>Історія</h2>
<ul id="history"></ul>

<h3>Чат</h3>
<div id="chat" style="height:200px; overflow:auto; border:1px solid white;"></div>

<input type="text" id="chatInput" placeholder="Повідомлення">
<button onclick="sendMessage()">Відправити</button>
</div>

<div id="right">
<h1>Рулетка 888 ONLINE</h1>

<p>Баланс: <span id="balance"></span></p>
<p>Ставка: <span id="selected"></span></p>

<input type="number" id="bet" placeholder="Сума">
<br><br>

<div id="board" class="board"></div>
<div class="special" id="special"></div>

<p id="result">Підключення...</p>
</div>

<script>
var socket;

function connect() {
    socket = new WebSocket("wss://online-site-yyx6.onrender.com");

    socket.onopen = function() {
        document.getElementById('result').innerText = 'Підключено';
    };

    socket.onmessage = function(event) {
        var data = JSON.parse(event.data);

        if (data.type === 'timer') {
            document.getElementById('result').innerText =
                'Наступний спін через: ' + data.value + ' сек';
        }

        if (data.type === 'result') {
            showResult(data.value);
        }

        if (data.type === 'chat') {
            var div = document.createElement('div');
            div.innerText = data.text;
            document.getElementById('chat').appendChild(div);
        }
    };

    socket.onclose = function() {
        document.getElementById('result').innerText = 'Втрачено зʼєднання...';
        setTimeout(connect, 2000);
    };
}

connect();

var balance = localStorage.getItem('balance') 
    ? parseInt(localStorage.getItem('balance')) 
    : 10000;

var selectedBets = [];
var currentBet = 10;

function getColor(n) {
    if (n === 0) return 'green';
    return n % 2 === 1 ? 'red' : 'black';
}

function createBoard() {
    var board = document.getElementById('board');

    var zero = document.createElement('div');
    zero.className = 'cell green';
    zero.innerText = '0';
    zero.onclick = function () { pick(0, zero); };
    board.parentNode.insertBefore(zero, board);

    for (var i = 1; i <= 36; i++) {
        var cell = document.createElement('div');
        cell.className = 'cell ' + getColor(i);
        cell.innerText = i;

        cell.onclick = (function(n, el){
            return function() { pick(n, el); }
        })(i, cell);

        board.appendChild(cell);
    }

    createSpecial();
}

function createSpecial() {
    var special = document.getElementById('special');

    var zones = ['1-18','EVEN','RED','BLACK','ODD','19-36','1st12','2nd12','3rd12'];

    zones.forEach(function(z){
        var el = document.createElement('div');
        el.className = 'cell';
        el.innerText = z;
        el.onclick = function(){ pick(z, el); };
        special.appendChild(el);
    });
}

function pick(value, el) {
    selectedBets = [value];
    document.querySelectorAll('.bet').forEach(e => e.classList.remove('bet'));
    el.classList.add('bet');
    document.getElementById('selected').innerText = value;

    var betInput = document.getElementById('bet');
    if (betInput.value) currentBet = parseInt(betInput.value);
}

function showResult(result) {
    var win = 0;
    var b = selectedBets[0];

    if (!b) return;

    if (typeof b === 'number' && b === result) win += currentBet * 35;
    if (b === 'RED' && result % 2 === 1 && result !== 0) win += currentBet * 2;
    if (b === 'BLACK' && result % 2 === 0 && result !== 0) win += currentBet * 2;

    if (win > 0) {
        balance += win - currentBet;
    } else {
        balance -= currentBet;
    }

    localStorage.setItem('balance', balance);
    document.getElementById('balance').innerText = balance;

    var li = document.createElement('li');
    li.innerText = 'Випало: ' + result;
    document.getElementById('history').prepend(li);
}

function sendMessage() {
    var input = document.getElementById('chatInput');
    var text = input.value;

    if (!text) return;

    socket.send(JSON.stringify({
        type: 'chat',
        text: text
    }));

    input.value = '';
}

document.getElementById('balance').innerText = balance;
createBoard();
</script>

</body>
</html>
