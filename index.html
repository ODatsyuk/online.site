<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Рулетка 888 ONLINE</title>

<style>
body {
    background: black;
    color: white;
    display: flex;
    font-family: Arial;
}

#left { width: 30%; padding: 10px; }
#right { width: 70%; text-align: center; }

.board {
    display: grid;
    grid-template-columns: repeat(12, 60px);
    gap: 2px;
    justify-content: center;
}

.cell {
    width: 60px;
    height: 60px;
    border: 1px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.red { background: red; }
.black { background: black; }
.green { background: green; }

.bet { outline: 3px solid yellow; }

.special {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 5px;
}

.special .cell {
    width: 90px;
    height: 40px;
}

#chat {
    height: 200px;
    overflow-y: auto;
    border: 1px solid white;
    padding: 5px;
}
</style>
</head>

<body>

<div id="left">
<h2>Історія</h2>
<ul id="history"></ul>

<h2>Чат</h2>
<div id="chat"></div>
<input id="chatInput" placeholder="Написати...">
<button onclick="sendMessage()">➤</button>
</div>

<div id="right">
<h1>Рулетка 888 ONLINE</h1>

<p>Баланс: <span id="balance"></span></p>
<p>Ставка: <span id="selected"></span></p>

<input type="number" id="bet" placeholder="Сума">
<br><br>

<div id="board" class="board"></div>
<div id="special" class="special"></div>

<p id="result">Підключення...</p>
</div>

<script>
var socket;

var balance = localStorage.getItem('balance') 
    ? parseInt(localStorage.getItem('balance')) 
    : 10000;

var selectedBets = [];
var currentBet = 10;

document.getElementById('balance').innerText = balance;

function connect() {
    socket = new WebSocket("ws://localhost:3000");

    socket.onopen = () => {
        document.getElementById('result').innerText = "Підключено";
    };

    socket.onmessage = function(event) {
        var data = JSON.parse(event.data);

        if (data.type === 'timer') {
            document.getElementById('result').innerText =
                'Спін через: ' + data.value + ' сек';
        }

        if (data.type === 'result') {
            showResult(data.value);
        }

        if (data.type === 'chat') {
            addMessage(data.message);
        }
    };

    socket.onclose = function() {
        document.getElementById('result').innerText = "Перепідключення...";
        setTimeout(connect, 2000);
    };
}

connect();

function sendMessage() {
    var input = document.getElementById('chatInput');
    var text = input.value.trim();
    if (!text) return;

    socket.send(JSON.stringify({
        type: 'chat',
        message: text
    }));

    input.value = '';
}

function addMessage(msg) {
    var chat = document.getElementById('chat');
    var div = document.createElement('div');
    div.innerText = msg;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function getColor(n) {
    if (n === 0) return 'green';
    return n % 2 === 1 ? 'red' : 'black';
}

function createBoard() {
    var board = document.getElementById('board');

    for (var i = 0; i <= 36; i++) {
        var cell = document.createElement('div');
        cell.className = 'cell ' + getColor(i);
        cell.innerText = i;

        cell.onclick = (function(n, el){
            return function() { pick(n, el); }
        })(i, cell);

        board.appendChild(cell);
    }

    createSpecial();
}

function createSpecial() {
    var special = document.getElementById('special');

    var zones = ['1-18','EVEN','RED','BLACK','ODD','19-36','1st12','2nd12','3rd12'];

    zones.forEach(function(z){
        var el = document.createElement('div');
        el.className = 'cell';
        el.innerText = z;

        el.onclick = function(){
            pick(z, el);
        };

        special.appendChild(el);
    });
}

function pick(value, el) {
    selectedBets = [value];

    document.querySelectorAll('.bet').forEach(e => e.classList.remove('bet'));
    el.classList.add('bet');

    document.getElementById('selected').innerText = value;

    var val = parseInt(document.getElementById('bet').value);
    if (!isNaN(val) && val > 0) currentBet = val;
}

function showResult(result) {
    var win = 0;
    var b = selectedBets[0];
    if (!b || isNaN(currentBet)) return;

    if (typeof b === 'number' && b === result) win += currentBet * 35;
    if (b === 'RED' && result % 2 === 1 && result !== 0) win += currentBet * 2;
    if (b === 'BLACK' && result % 2 === 0 && result !== 0) win += currentBet * 2;
    if (b === 'EVEN' && result % 2 === 0 && result !== 0) win += currentBet * 2;
    if (b === 'ODD' && result % 2 === 1) win += currentBet * 2;
    if (b === '1-18' && result >= 1 && result <= 18) win += currentBet * 2;
    if (b === '19-36' && result >= 19) win += currentBet * 2;

    if (b === '1st12' && result <= 12) win += currentBet * 3;
    if (b === '2nd12' && result >= 13 && result <= 24) win += currentBet * 3;
    if (b === '3rd12' && result >= 25) win += currentBet * 3;

    if (win > 0) balance += win - currentBet;
    else balance -= currentBet;

    localStorage.setItem('balance', balance);
    document.getElementById('balance').innerText = balance;

    var li = document.createElement('li');
    li.innerText = 'Випало: ' + result + (win > 0 ? ' | Виграш +' + win : ' | Програш');
    document.getElementById('history').prepend(li);
}

createBoard();
</script>

</body>
</html>
